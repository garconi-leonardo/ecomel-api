services:
  db:
    image: postgres:15-alpine
    container_name: ecomel-db
    environment:
      POSTGRES_DB: ecomel
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ecomel"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecomel-network

  app:
    build: .
    container_name: ecomel-backend
    ports:
      - "8080:8080"
    environment:
      # Spring Boot converte automaticamente APP_JWT_SECRET para app.jwt.secret
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ecomel
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      APP_JWT_SECRET: MinhaChaveSuperSecretaComMaisDe64CaracteresParaGarantirASegurancaDoSistemaEcomel2024
      APP_JWT_EXPIRATION: 86400000
      # Recomendado para ver logs detalhados se houver novo erro
      SPRING_PROFILES_ACTIVE: dev 
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecomel-network

networks:
  ecomel-network:
    driver: bridge