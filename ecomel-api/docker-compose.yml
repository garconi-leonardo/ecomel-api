version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ecomel-db
    environment:
      POSTGRES_DB: ecomel
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ecomel"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ecomel-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ecomel
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
    depends_on:
      db:
        condition: service_healthy
